<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 170" fill="none">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="borderGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff41">
        <animate attributeName="stop-color" values="#00ff41;#00d4ff;#a855f7;#00ff41" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#a855f7">
        <animate attributeName="stop-color" values="#a855f7;#00ff41;#00d4ff;#a855f7" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .code-font {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 13px;
    }
  </style>

  <!-- Card background -->
  <rect x="2" y="2" width="416" height="166" rx="10" fill="none" stroke="url(#borderGrad2)" stroke-width="1.5" opacity="0.6"/>
  <rect x="4" y="4" width="412" height="162" rx="9" fill="url(#cardGrad)"/>

  <!-- Status indicator -->
  <circle cx="22" cy="30" r="5" fill="#00ff41" filter="url(#glow2)">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text class="code-font" x="34" y="34" fill="#8b949e" font-size="12">STATUS: ONLINE</text>

  <!-- Section title -->
  <text class="code-font" x="18" y="60" fill="#00d4ff" font-size="14" filter="url(#glow2)">$ currently_working_on</text>

  <!-- Code lines -->
  <text class="code-font" x="30" y="85" fill="#6b7280">const</text>
  <text class="code-font" x="72" y="85" fill="#e2e8f0">project</text>
  <text class="code-font" x="130" y="85" fill="#6b7280">=</text>
  <text class="code-font" x="145" y="85" fill="#fbbf24">"Cool Stuff"</text>
  <text class="code-font" x="258" y="85" fill="#6b7280">;</text>

  <text class="code-font" x="30" y="108" fill="#6b7280">const</text>
  <text class="code-font" x="72" y="108" fill="#e2e8f0">mood</text>
  <text class="code-font" x="115" y="108" fill="#6b7280">=</text>
  <text class="code-font" x="135" y="108" fill="#fbbf24">"Caffeinated"</text>
  <text class="code-font" x="265" y="108" fill="#6b7280">;</text>

  <!-- Loading bar -->
  <text class="code-font" x="18" y="140" fill="#a855f7" font-size="11">COMPILING...</text>
  <rect x="120" y="131" width="230" height="12" rx="6" fill="#21262d" stroke="#30363d" stroke-width="0.5"/>
  <rect x="122" y="133" width="0" height="8" rx="4" fill="#00ff41" filter="url(#glow2)">
    <animate attributeName="width" from="0" to="226" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Progress percentage — positioned right of the bar -->
  <text class="code-font" x="358" y="141" fill="#00ff41" font-size="11" text-anchor="start">
    <animate attributeName="opacity" calcMode="discrete" dur="3s" repeatCount="indefinite"
      values="1;0" keyTimes="0;0.1"/>
    0%</text>
  <text class="code-font" x="358" y="141" fill="#00ff41" font-size="11" text-anchor="start">
    <animate attributeName="opacity" calcMode="discrete" dur="3s" repeatCount="indefinite"
      values="0;1;0" keyTimes="0;0.1;0.2"/>
    10%</text>
  <text class="code-font" x="358" y="141" fill="#00ff41" font-size="11" text-anchor="start">
    <animate attributeName="opacity" calcMode="discrete" dur="3s" repeatCount="indefinite"
      values="0;1;0" keyTimes="0;0.2;0.3"/>
    24%</text>
  <text class="code-font" x="358" y="141" fill="#00ff41" font-size="11" text-anchor="start">
    <animate attributeName="opacity" calcMode="discrete" dur="3s" repeatCount="indefinite"
      values="0;1;0" keyTimes="0;0.3;0.4"/>
    37%</text>
  <text class="code-font" x="358" y="141" fill="#00ff41" font-size="11" text-anchor="start">
    <animate attributeName="opacity" calcMode="discrete" dur="3s" repeatCount="indefinite"
      values="0;1;0" keyTimes="0;0.4;0.5"/>
    51%</text>
  <text class="code-font" x="358" y="141" fill="#00ff41" font-size="11" text-anchor="start">
    <animate attributeName="opacity" calcMode="discrete" dur="3s" repeatCount="indefinite"
      values="0;1;0" keyTimes="0;0.5;0.6"/>
    64%</text>
  <text class="code-font" x="358" y="141" fill="#00ff41" font-size="11" text-anchor="start">
    <animate attributeName="opacity" calcMode="discrete" dur="3s" repeatCount="indefinite"
      values="0;1;0" keyTimes="0;0.6;0.7"/>
    73%</text>
  <text class="code-font" x="358" y="141" fill="#00ff41" font-size="11" text-anchor="start">
    <animate attributeName="opacity" calcMode="discrete" dur="3s" repeatCount="indefinite"
      values="0;1;0" keyTimes="0;0.7;0.8"/>
    85%</text>
  <text class="code-font" x="358" y="141" fill="#00ff41" font-size="11" text-anchor="start">
    <animate attributeName="opacity" calcMode="discrete" dur="3s" repeatCount="indefinite"
      values="0;1;0" keyTimes="0;0.8;0.9"/>
    93%</text>
  <text class="code-font" x="354" y="141" fill="#00ff41" font-size="11" text-anchor="start">
    <animate attributeName="opacity" calcMode="discrete" dur="3s" repeatCount="indefinite"
      values="0;1" keyTimes="0;0.9"/>
    100%</text>

</svg>
