<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 170" fill="none">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="borderGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff41">
        <animate attributeName="stop-color" values="#00ff41;#00d4ff;#a855f7;#00ff41" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#a855f7">
        <animate attributeName="stop-color" values="#a855f7;#00ff41;#00d4ff;#a855f7" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .code-font {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 13px;
    }
  </style>

  <!-- Card background -->
  <rect x="2" y="2" width="416" height="166" rx="10" fill="none" stroke="url(#borderGrad2)" stroke-width="1.5" opacity="0.6"/>
  <rect x="4" y="4" width="412" height="162" rx="9" fill="url(#cardGrad)"/>

  <!-- Status indicator -->
  <circle cx="22" cy="30" r="5" fill="#00ff41" filter="url(#glow2)">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text class="code-font" x="34" y="34" fill="#8b949e" font-size="12">STATUS: ONLINE</text>

  <!-- Section title -->
  <text class="code-font" x="18" y="60" fill="#00d4ff" font-size="14" filter="url(#glow2)">$ currently_working_on</text>

  <!-- Code lines -->
  <text class="code-font" x="30" y="85" fill="#6b7280">const</text>
  <text class="code-font" x="72" y="85" fill="#e2e8f0">project</text>
  <text class="code-font" x="130" y="85" fill="#6b7280">=</text>
  <text class="code-font" x="145" y="85" fill="#fbbf24">"Cool Stuff"</text>
  <text class="code-font" x="258" y="85" fill="#6b7280">;</text>

  <text class="code-font" x="30" y="108" fill="#6b7280">const</text>
  <text class="code-font" x="72" y="108" fill="#e2e8f0">mood</text>
  <text class="code-font" x="115" y="108" fill="#6b7280">=</text>
  <text class="code-font" x="135" y="108" fill="#fbbf24">"Caffeinated"</text>
  <text class="code-font" x="265" y="108" fill="#6b7280">;</text>

  <!-- Loading bar -->
  <text class="code-font" x="18" y="140" fill="#a855f7" font-size="11">COMPILING...</text>
  <rect x="120" y="131" width="270" height="12" rx="6" fill="#21262d" stroke="#30363d" stroke-width="0.5"/>
  <rect x="122" y="133" width="0" height="8" rx="4" fill="#00ff41" filter="url(#glow2)">
    <animate attributeName="width" from="0" to="266" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Progress percentage: cycles 0% -> 100% in sync with the 3s bar -->
  <g font-size="11" text-anchor="end" fill="#00ff41" class="code-font">
    <!-- 0% (0s - 0.3s) -->
    <text x="396" y="141" opacity="1">
      <animate attributeName="opacity" values="1;0" dur="0.01s" begin="0.3s" fill="freeze" repeatCount="indefinite" repeatDur="3s"/>
      0%
    </text>
    <!-- 10% (0.3s - 0.6s) -->
    <text x="396" y="141" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.001;0.999;1" dur="0.3s" begin="0.3s" fill="freeze" repeatCount="indefinite" repeatDur="3s"/>
      10%
    </text>
    <!-- 20% (0.6s - 0.9s) -->
    <text x="396" y="141" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.001;0.999;1" dur="0.3s" begin="0.6s" fill="freeze" repeatCount="indefinite" repeatDur="3s"/>
      20%
    </text>
    <!-- 33% (0.9s - 1.2s) -->
    <text x="396" y="141" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.001;0.999;1" dur="0.3s" begin="0.9s" fill="freeze" repeatCount="indefinite" repeatDur="3s"/>
      33%
    </text>
    <!-- 45% (1.2s - 1.5s) -->
    <text x="396" y="141" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.001;0.999;1" dur="0.3s" begin="1.2s" fill="freeze" repeatCount="indefinite" repeatDur="3s"/>
      45%
    </text>
    <!-- 58% (1.5s - 1.8s) -->
    <text x="396" y="141" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.001;0.999;1" dur="0.3s" begin="1.5s" fill="freeze" repeatCount="indefinite" repeatDur="3s"/>
      58%
    </text>
    <!-- 69% (1.8s - 2.1s) -->
    <text x="396" y="141" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.001;0.999;1" dur="0.3s" begin="1.8s" fill="freeze" repeatCount="indefinite" repeatDur="3s"/>
      69%
    </text>
    <!-- 77% (2.1s - 2.4s) -->
    <text x="396" y="141" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.001;0.999;1" dur="0.3s" begin="2.1s" fill="freeze" repeatCount="indefinite" repeatDur="3s"/>
      77%
    </text>
    <!-- 88% (2.4s - 2.7s) -->
    <text x="396" y="141" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.001;0.999;1" dur="0.3s" begin="2.4s" fill="freeze" repeatCount="indefinite" repeatDur="3s"/>
      88%
    </text>
    <!-- 100% (2.7s - 3.0s) -->
    <text x="396" y="141" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.001;0.999;1" dur="0.3s" begin="2.7s" fill="freeze" repeatCount="indefinite" repeatDur="3s"/>
      100%
    </text>
  </g>
</svg>
