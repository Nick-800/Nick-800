<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" fill="none">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff41">
        <animate attributeName="stop-color" values="#00ff41;#00d4ff;#a855f7;#00ff41" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#00d4ff">
        <animate attributeName="stop-color" values="#00d4ff;#a855f7;#00ff41;#00d4ff" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#a855f7">
        <animate attributeName="stop-color" values="#a855f7;#00ff41;#00d4ff;#a855f7" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="terminalClip">
      <rect x="10" y="10" width="880" height="380" rx="12"/>
    </clipPath>
  </defs>
  
  <style>
    @keyframes typing1 {
      0%, 8% { width: 0; }
      15%, 100% { width: 410px; }
    }
    @keyframes typing2 {
      0%, 20% { width: 0; }
      30%, 100% { width: 490px; }
    }
    @keyframes typing3 {
      0%, 35% { width: 0; }
      45%, 100% { width: 560px; }
    }
    @keyframes typing4 {
      0%, 50% { width: 0; }
      60%, 100% { width: 380px; }
    }
    @keyframes typing5 {
      0%, 65% { width: 0; }
      75%, 100% { width: 460px; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes cursorMove {
      0%, 8% { transform: translate(98px, 128px); }
      15%, 20% { transform: translate(508px, 128px); }
      20%, 30% { transform: translate(98px, 168px); }
      30%, 35% { transform: translate(588px, 168px); }
      35%, 45% { transform: translate(98px, 208px); }
      45%, 50% { transform: translate(658px, 208px); }
      50%, 60% { transform: translate(98px, 248px); }
      60%, 65% { transform: translate(478px, 248px); }
      65%, 75% { transform: translate(98px, 288px); }
      75%, 100% { transform: translate(558px, 288px); }
    }
    @keyframes scanline {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(400px); }
    }
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes matrixDrop {
      0% { transform: translateY(-20px); opacity: 0; }
      10% { opacity: 0.4; }
      90% { opacity: 0.4; }
      100% { transform: translateY(400px); opacity: 0; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }
    @keyframes dotPulse1 { 0%, 100% { r: 6; } 50% { r: 7; } }
    @keyframes dotPulse2 { 0%, 100% { r: 6; } 50% { r: 7; } }
    @keyframes dotPulse3 { 0%, 100% { r: 6; } 50% { r: 7; } }
    
    .terminal-text {
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 16px;
      fill: #00ff41;
      filter: url(#glow);
    }
    .prompt {
      fill: #a855f7;
      font-weight: bold;
    }
    .command {
      fill: #00d4ff;
    }
    .output {
      fill: #e2e8f0;
    }
    .comment {
      fill: #6b7280;
      font-style: italic;
    }
    .string {
      fill: #fbbf24;
    }
    .keyword {
      fill: #f472b6;
    }
    .matrix-char {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      fill: #00ff41;
      opacity: 0.15;
    }
  </style>
  
  <!-- Outer glow border -->
  <rect x="2" y="2" width="896" height="396" rx="14" fill="none" stroke="url(#borderGrad)" stroke-width="2" opacity="0.8"/>
  
  <!-- Terminal background -->
  <rect x="5" y="5" width="890" height="390" rx="12" fill="url(#headerGrad)" stroke="#30363d" stroke-width="1"/>
  
  <!-- Scanline effect -->
  <g clip-path="url(#terminalClip)" opacity="0.03">
    <rect x="10" y="0" width="880" height="4" fill="#00ff41">
      <animateTransform attributeName="transform" type="translate" from="0 -4" to="0 400" dur="4s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Matrix rain characters (background decoration) -->
  <g clip-path="url(#terminalClip)">
    <text class="matrix-char" x="50" y="0"><animate attributeName="y" from="-20" to="400" dur="8s" repeatCount="indefinite" begin="0s"/>01</text>
    <text class="matrix-char" x="120" y="0"><animate attributeName="y" from="-20" to="400" dur="6s" repeatCount="indefinite" begin="1s"/>DF</text>
    <text class="matrix-char" x="200" y="0"><animate attributeName="y" from="-20" to="400" dur="9s" repeatCount="indefinite" begin="2s"/>A7</text>
    <text class="matrix-char" x="310" y="0"><animate attributeName="y" from="-20" to="400" dur="7s" repeatCount="indefinite" begin="0.5s"/>C3</text>
    <text class="matrix-char" x="420" y="0"><animate attributeName="y" from="-20" to="400" dur="5s" repeatCount="indefinite" begin="3s"/>9E</text>
    <text class="matrix-char" x="530" y="0"><animate attributeName="y" from="-20" to="400" dur="8s" repeatCount="indefinite" begin="1.5s"/>B5</text>
    <text class="matrix-char" x="620" y="0"><animate attributeName="y" from="-20" to="400" dur="6s" repeatCount="indefinite" begin="2.5s"/>F8</text>
    <text class="matrix-char" x="720" y="0"><animate attributeName="y" from="-20" to="400" dur="7s" repeatCount="indefinite" begin="0.8s"/>42</text>
    <text class="matrix-char" x="800" y="0"><animate attributeName="y" from="-20" to="400" dur="9s" repeatCount="indefinite" begin="1.2s"/>7D</text>
    <text class="matrix-char" x="160" y="0"><animate attributeName="y" from="-20" to="400" dur="10s" repeatCount="indefinite" begin="3.5s"/>E1</text>
    <text class="matrix-char" x="370" y="0"><animate attributeName="y" from="-20" to="400" dur="6.5s" repeatCount="indefinite" begin="4s"/>8C</text>
    <text class="matrix-char" x="680" y="0"><animate attributeName="y" from="-20" to="400" dur="7.5s" repeatCount="indefinite" begin="2s"/>3F</text>
    <text class="matrix-char" x="850" y="0"><animate attributeName="y" from="-20" to="400" dur="5.5s" repeatCount="indefinite" begin="1s"/>6A</text>
    <text class="matrix-char" x="90" y="0"><animate attributeName="y" from="-20" to="400" dur="8.5s" repeatCount="indefinite" begin="3s"/>D2</text>
    <text class="matrix-char" x="470" y="0"><animate attributeName="y" from="-20" to="400" dur="6s" repeatCount="indefinite" begin="4.5s"/>1B</text>
    <text class="matrix-char" x="580" y="0"><animate attributeName="y" from="-20" to="400" dur="9.5s" repeatCount="indefinite" begin="0.3s"/>5E</text>
  </g>
  
  <!-- Title bar -->
  <rect x="5" y="5" width="890" height="40" rx="12" fill="#1c2128"/>
  <rect x="5" y="33" width="890" height="12" fill="#1c2128"/>
  
  <!-- Window buttons -->
  <circle cx="30" cy="25" r="6" fill="#ff5f57">
    <animate attributeName="r" values="6;7;6" dur="2s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle cx="52" cy="25" r="6" fill="#febc2e">
    <animate attributeName="r" values="6;7;6" dur="2s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
  <circle cx="74" cy="25" r="6" fill="#28c840">
    <animate attributeName="r" values="6;7;6" dur="2s" repeatCount="indefinite" begin="0.6s"/>
  </circle>
  
  <!-- Title bar text -->
  <text x="450" y="29" text-anchor="middle" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="13" fill="#8b949e">nick@github:~/Nick-800 — bash</text>
  
  <!-- Separator line -->
  <line x1="5" y1="45" x2="895" y2="45" stroke="#30363d" stroke-width="1"/>
  
  <!-- Terminal content with typing animation -->
  
  <!-- Line 1: whoami -->
  <g>
    <text class="terminal-text prompt" x="30" y="80">nick@dev</text>
    <text class="terminal-text" x="118" y="80" fill="#6b7280">:</text>
    <text class="terminal-text command" x="126" y="80">~$</text>
    <text class="terminal-text output" x="152" y="80">whoami</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" fill="freeze" begin="0.5s"/>
  </g>
  
  <!-- Line 2: output -->
  <g opacity="0">
    <text class="terminal-text string" x="30" y="110">→ Sohaib Kamash | Full-Stack Developer | Code Architect</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" fill="freeze" begin="1.5s"/>
  </g>
  
  <!-- Line 3: cat skills -->
  <g opacity="0">
    <text class="terminal-text prompt" x="30" y="150">nick@dev</text>
    <text class="terminal-text" x="118" y="150" fill="#6b7280">:</text>
    <text class="terminal-text command" x="126" y="150">~$</text>
    <text class="terminal-text output" x="152" y="150">cat ./skills/languages.json</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" fill="freeze" begin="2.5s"/>
  </g>
  
  <!-- Line 4: output JSON -->
  <g opacity="0">
    <text class="terminal-text" x="30" y="180" fill="#6b7280">{</text>
    <text class="terminal-text keyword" x="50" y="180">"languages"</text>
    <text class="terminal-text" x="160" y="180" fill="#6b7280">:</text>
    <text class="terminal-text" x="175" y="180" fill="#6b7280">[</text>
    <text class="terminal-text string" x="185" y="180">"PHP"</text>
    <text class="terminal-text" x="225" y="180" fill="#6b7280">,</text>
    <text class="terminal-text string" x="235" y="180">"JavaScript"</text>
    <text class="terminal-text" x="342" y="180" fill="#6b7280">,</text>
    <text class="terminal-text string" x="352" y="180">"TypeScript"</text>
    <text class="terminal-text" x="462" y="180" fill="#6b7280">,</text>
    <text class="terminal-text string" x="472" y="180">"Dart"</text>
    <text class="terminal-text" x="518" y="180" fill="#6b7280">,</text>
    <text class="terminal-text string" x="528" y="180">"Python"</text>
    <text class="terminal-text" x="596" y="180" fill="#6b7280">]</text>
    <text class="terminal-text" x="606" y="180" fill="#6b7280">}</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" fill="freeze" begin="3.5s"/>
  </g>
  
  <!-- Line 5: frameworks -->
  <g opacity="0">
    <text class="terminal-text prompt" x="30" y="220">nick@dev</text>
    <text class="terminal-text" x="118" y="220" fill="#6b7280">:</text>
    <text class="terminal-text command" x="126" y="220">~$</text>
    <text class="terminal-text output" x="152" y="220">cat ./skills/frameworks.json</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" fill="freeze" begin="4.5s"/>
  </g>
  
  <!-- Line 6: frameworks output -->
  <g opacity="0">
    <text class="terminal-text" x="30" y="250" fill="#6b7280">{</text>
    <text class="terminal-text keyword" x="50" y="250">"stack"</text>
    <text class="terminal-text" x="110" y="250" fill="#6b7280">:</text>
    <text class="terminal-text" x="125" y="250" fill="#6b7280">[</text>
    <text class="terminal-text string" x="135" y="250">"Laravel"</text>
    <text class="terminal-text" x="216" y="250" fill="#6b7280">,</text>
    <text class="terminal-text string" x="226" y="250">"React"</text>
    <text class="terminal-text" x="285" y="250" fill="#6b7280">,</text>
    <text class="terminal-text string" x="295" y="250">"Next.js"</text>
    <text class="terminal-text" x="375" y="250" fill="#6b7280">,</text>
    <text class="terminal-text string" x="385" y="250">"Flutter"</text>
    <text class="terminal-text" x="463" y="250" fill="#6b7280">,</text>
    <text class="terminal-text string" x="473" y="250">"Node.js"</text>
    <text class="terminal-text" x="553" y="250" fill="#6b7280">]</text>
    <text class="terminal-text" x="563" y="250" fill="#6b7280">}</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" fill="freeze" begin="5.5s"/>
  </g>
  
  <!-- Line 7: status -->
  <g opacity="0">
    <text class="terminal-text prompt" x="30" y="290">nick@dev</text>
    <text class="terminal-text" x="118" y="290" fill="#6b7280">:</text>
    <text class="terminal-text command" x="126" y="290">~$</text>
    <text class="terminal-text output" x="152" y="290">echo $STATUS</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" fill="freeze" begin="6.5s"/>
  </g>
  
  <!-- Line 8: status output -->
  <g opacity="0">
    <text class="terminal-text" x="30" y="320" fill="#28c840">🚀 Building the future, one commit at a time...</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" fill="freeze" begin="7.5s"/>
  </g>
  
  <!-- Blinking cursor -->
  <g opacity="0">
    <rect x="30" y="340" width="10" height="20" fill="#00ff41" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
    <text class="terminal-text prompt" x="30" y="370">nick@dev</text>
    <text class="terminal-text" x="118" y="370" fill="#6b7280">:</text>
    <text class="terminal-text command" x="126" y="370">~$</text>
    <rect x="150" y="355" width="10" height="18" fill="#00ff41" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" fill="freeze" begin="8.5s"/>
  </g>
  
  <!-- Subtle grid lines -->
  <g clip-path="url(#terminalClip)" opacity="0.02">
    <line x1="10" y1="80" x2="890" y2="80" stroke="#00ff41"/>
    <line x1="10" y1="120" x2="890" y2="120" stroke="#00ff41"/>
    <line x1="10" y1="160" x2="890" y2="160" stroke="#00ff41"/>
    <line x1="10" y1="200" x2="890" y2="200" stroke="#00ff41"/>
    <line x1="10" y1="240" x2="890" y2="240" stroke="#00ff41"/>
    <line x1="10" y1="280" x2="890" y2="280" stroke="#00ff41"/>
    <line x1="10" y1="320" x2="890" y2="320" stroke="#00ff41"/>
    <line x1="10" y1="360" x2="890" y2="360" stroke="#00ff41"/>
  </g>
</svg>
