<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" fill="none">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff41">
        <animate attributeName="stop-color" values="#00ff41;#00d4ff;#a855f7;#00ff41" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#00d4ff">
        <animate attributeName="stop-color" values="#00d4ff;#a855f7;#00ff41;#00d4ff" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#a855f7">
        <animate attributeName="stop-color" values="#a855f7;#00ff41;#00d4ff;#a855f7" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="terminalClip">
      <rect x="10" y="10" width="880" height="400" rx="12"/>
    </clipPath>

    <!-- Typing clip paths: each reveals text character by character via animated width -->
    <!-- Line 1 cmd: "whoami" = 6 chars. Prompt "nick@dev :~$ " is static. -->
    <clipPath id="type1">
      <rect x="152" y="60" height="30" width="0">
        <animate attributeName="width" from="0" to="70" dur="0.5s" begin="0.8s" fill="freeze"/>
      </rect>
    </clipPath>

    <!-- Line 3 cmd: "cat ./skills/languages.json" = 28 chars -->
    <clipPath id="type2">
      <rect x="152" y="130" height="30" width="0">
        <animate attributeName="width" from="0" to="290" dur="1.2s" begin="2.5s" fill="freeze"/>
      </rect>
    </clipPath>

    <!-- Line 5 cmd: "cat ./skills/frameworks.json" = 29 chars -->
    <clipPath id="type3">
      <rect x="152" y="230" height="30" width="0">
        <animate attributeName="width" from="0" to="300" dur="1.2s" begin="5.5s" fill="freeze"/>
      </rect>
    </clipPath>

    <!-- Line 7 cmd: "echo $STATUS" = 12 chars -->
    <clipPath id="type4">
      <rect x="152" y="330" height="30" width="0">
        <animate attributeName="width" from="0" to="130" dur="0.6s" begin="8.5s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>

  <style>
    .t {
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'SF Mono', monospace;
      font-size: 16px;
    }
    .prompt { fill: #a855f7; font-weight: bold; }
    .sep { fill: #6b7280; }
    .cmd-prefix { fill: #00d4ff; }
    .cmd { fill: #e2e8f0; }
    .out { fill: #e2e8f0; }
    .str { fill: #fbbf24; }
    .key { fill: #f472b6; }
    .brace { fill: #6b7280; }
    .green { fill: #28c840; }
    .arrow { fill: #00ff41; }
    .matrix-char {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      fill: #00ff41;
      opacity: 0.12;
    }

    /* Blinking cursor */
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
    .cursor { animation: blink 1s step-end infinite; }
  </style>

  <!-- Outer glow border -->
  <rect x="2" y="2" width="896" height="416" rx="14" fill="none" stroke="url(#borderGrad)" stroke-width="2" opacity="0.8"/>

  <!-- Terminal background -->
  <rect x="5" y="5" width="890" height="410" rx="12" fill="url(#headerGrad)" stroke="#30363d" stroke-width="1"/>

  <!-- Scanline effect -->
  <g clip-path="url(#terminalClip)" opacity="0.03">
    <rect x="10" y="0" width="880" height="4" fill="#00ff41">
      <animateTransform attributeName="transform" type="translate" from="0 -4" to="0 420" dur="4s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Matrix rain background -->
  <g clip-path="url(#terminalClip)">
    <text class="matrix-char" x="50" y="0"><animate attributeName="y" from="-20" to="420" dur="8s" repeatCount="indefinite" begin="0s"/>01</text>
    <text class="matrix-char" x="120" y="0"><animate attributeName="y" from="-20" to="420" dur="6s" repeatCount="indefinite" begin="1s"/>DF</text>
    <text class="matrix-char" x="200" y="0"><animate attributeName="y" from="-20" to="420" dur="9s" repeatCount="indefinite" begin="2s"/>A7</text>
    <text class="matrix-char" x="310" y="0"><animate attributeName="y" from="-20" to="420" dur="7s" repeatCount="indefinite" begin="0.5s"/>C3</text>
    <text class="matrix-char" x="420" y="0"><animate attributeName="y" from="-20" to="420" dur="5s" repeatCount="indefinite" begin="3s"/>9E</text>
    <text class="matrix-char" x="530" y="0"><animate attributeName="y" from="-20" to="420" dur="8s" repeatCount="indefinite" begin="1.5s"/>B5</text>
    <text class="matrix-char" x="620" y="0"><animate attributeName="y" from="-20" to="420" dur="6s" repeatCount="indefinite" begin="2.5s"/>F8</text>
    <text class="matrix-char" x="720" y="0"><animate attributeName="y" from="-20" to="420" dur="7s" repeatCount="indefinite" begin="0.8s"/>42</text>
    <text class="matrix-char" x="800" y="0"><animate attributeName="y" from="-20" to="420" dur="9s" repeatCount="indefinite" begin="1.2s"/>7D</text>
    <text class="matrix-char" x="160" y="0"><animate attributeName="y" from="-20" to="420" dur="10s" repeatCount="indefinite" begin="3.5s"/>E1</text>
    <text class="matrix-char" x="370" y="0"><animate attributeName="y" from="-20" to="420" dur="6.5s" repeatCount="indefinite" begin="4s"/>8C</text>
    <text class="matrix-char" x="680" y="0"><animate attributeName="y" from="-20" to="420" dur="7.5s" repeatCount="indefinite" begin="2s"/>3F</text>
    <text class="matrix-char" x="850" y="0"><animate attributeName="y" from="-20" to="420" dur="5.5s" repeatCount="indefinite" begin="1s"/>6A</text>
  </g>

  <!-- Title bar -->
  <rect x="5" y="5" width="890" height="40" rx="12" fill="#1c2128"/>
  <rect x="5" y="33" width="890" height="12" fill="#1c2128"/>

  <!-- Window buttons -->
  <circle cx="30" cy="25" r="6" fill="#ff5f57">
    <animate attributeName="r" values="6;7;6" dur="2s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle cx="52" cy="25" r="6" fill="#febc2e">
    <animate attributeName="r" values="6;7;6" dur="2s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
  <circle cx="74" cy="25" r="6" fill="#28c840">
    <animate attributeName="r" values="6;7;6" dur="2s" repeatCount="indefinite" begin="0.6s"/>
  </circle>

  <!-- Title bar text -->
  <text x="450" y="29" text-anchor="middle" class="t" font-size="13" fill="#8b949e">nick@github:~/Nick-800 -- bash</text>

  <!-- Separator line -->
  <line x1="5" y1="45" x2="895" y2="45" stroke="#30363d" stroke-width="1"/>


  <!-- ============================================================ -->
  <!-- LINE 1: prompt appears, then "whoami" types out               -->
  <!-- ============================================================ -->

  <!-- Prompt (appears instantly at start) -->
  <g opacity="0">
    <text class="t prompt" x="30" y="80">nick@dev</text>
    <text class="t sep" x="118" y="80">:</text>
    <text class="t cmd-prefix" x="126" y="80">~$</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.01s" fill="freeze" begin="0.5s"/>
  </g>

  <!-- Typing cursor for line 1 - moves with text, disappears when done -->
  <rect x="152" y="65" width="10" height="18" fill="#00ff41" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.01s" fill="freeze" begin="0.7s"/>
    <animate attributeName="opacity" from="1" to="0" dur="0.01s" fill="freeze" begin="1.3s"/>
    <animate attributeName="x" from="152" to="222" dur="0.5s" begin="0.8s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1" dur="0.4s" repeatCount="indefinite" begin="0.7s"/>
  </rect>

  <!-- "whoami" - revealed by typing clip -->
  <g clip-path="url(#type1)">
    <text class="t cmd" x="152" y="80">whoami</text>
  </g>


  <!-- ============================================================ -->
  <!-- LINE 2: output (appears after typing finishes)                -->
  <!-- ============================================================ -->
  <g opacity="0">
    <text class="t arrow" x="30" y="110" filter="url(#glow)">-&gt;</text>
    <text class="t str" x="58" y="110">Sohaib Kamash | Full-Stack Developer | Code Architect</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.15s" fill="freeze" begin="1.8s"/>
  </g>


  <!-- ============================================================ -->
  <!-- LINE 3: prompt + "cat ./skills/languages.json" types out      -->
  <!-- ============================================================ -->
  <g opacity="0">
    <text class="t prompt" x="30" y="150">nick@dev</text>
    <text class="t sep" x="118" y="150">:</text>
    <text class="t cmd-prefix" x="126" y="150">~$</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.01s" fill="freeze" begin="2.3s"/>
  </g>

  <!-- Typing cursor for line 3 -->
  <rect x="152" y="135" width="10" height="18" fill="#00ff41" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.01s" fill="freeze" begin="2.4s"/>
    <animate attributeName="opacity" from="1" to="0" dur="0.01s" fill="freeze" begin="3.7s"/>
    <animate attributeName="x" from="152" to="442" dur="1.2s" begin="2.5s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1" dur="0.4s" repeatCount="indefinite" begin="2.4s"/>
  </rect>

  <g clip-path="url(#type2)">
    <text class="t cmd" x="152" y="150">cat ./skills/languages.json</text>
  </g>


  <!-- ============================================================ -->
  <!-- LINE 4: JSON output (appears after typing finishes)           -->
  <!-- ============================================================ -->
  <g opacity="0">
    <text class="t brace" x="30" y="185">{</text>
    <text class="t key" x="50" y="185">"languages"</text>
    <text class="t brace" x="160" y="185">:</text>
    <text class="t brace" x="175" y="185">[</text>
    <text class="t str" x="185" y="185">"PHP"</text>
    <text class="t brace" x="227" y="185">,</text>
    <text class="t str" x="240" y="185">"JavaScript"</text>
    <text class="t brace" x="350" y="185">,</text>
    <text class="t str" x="363" y="185">"TypeScript"</text>
    <text class="t brace" x="473" y="185">,</text>
    <text class="t str" x="486" y="185">"Dart"</text>
    <text class="t brace" x="533" y="185">,</text>
    <text class="t str" x="546" y="185">"Python"</text>
    <text class="t brace" x="618" y="185">]</text>
    <text class="t brace" x="630" y="185">}</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.15s" fill="freeze" begin="4.2s"/>
  </g>


  <!-- ============================================================ -->
  <!-- LINE 5: prompt + "cat ./skills/frameworks.json" types out     -->
  <!-- ============================================================ -->
  <g opacity="0">
    <text class="t prompt" x="30" y="250">nick@dev</text>
    <text class="t sep" x="118" y="250">:</text>
    <text class="t cmd-prefix" x="126" y="250">~$</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.01s" fill="freeze" begin="5.0s"/>
  </g>

  <!-- Typing cursor for line 5 -->
  <rect x="152" y="235" width="10" height="18" fill="#00ff41" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.01s" fill="freeze" begin="5.2s"/>
    <animate attributeName="opacity" from="1" to="0" dur="0.01s" fill="freeze" begin="6.7s"/>
    <animate attributeName="x" from="152" to="452" dur="1.2s" begin="5.5s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1" dur="0.4s" repeatCount="indefinite" begin="5.2s"/>
  </rect>

  <g clip-path="url(#type3)">
    <text class="t cmd" x="152" y="250">cat ./skills/frameworks.json</text>
  </g>


  <!-- ============================================================ -->
  <!-- LINE 6: JSON output                                          -->
  <!-- ============================================================ -->
  <g opacity="0">
    <text class="t brace" x="30" y="285">{</text>
    <text class="t key" x="50" y="285">"stack"</text>
    <text class="t brace" x="110" y="285">:</text>
    <text class="t brace" x="125" y="285">[</text>
    <text class="t str" x="135" y="285">"Laravel"</text>
    <text class="t brace" x="216" y="285">,</text>
    <text class="t str" x="229" y="285">"React"</text>
    <text class="t brace" x="290" y="285">,</text>
    <text class="t str" x="303" y="285">"Next.js"</text>
    <text class="t brace" x="383" y="285">,</text>
    <text class="t str" x="396" y="285">"Flutter"</text>
    <text class="t brace" x="473" y="285">,</text>
    <text class="t str" x="486" y="285">"Node.js"</text>
    <text class="t brace" x="563" y="285">]</text>
    <text class="t brace" x="575" y="285">}</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.15s" fill="freeze" begin="7.2s"/>
  </g>


  <!-- ============================================================ -->
  <!-- LINE 7: prompt + "echo $STATUS" types out                    -->
  <!-- ============================================================ -->
  <g opacity="0">
    <text class="t prompt" x="30" y="350">nick@dev</text>
    <text class="t sep" x="118" y="350">:</text>
    <text class="t cmd-prefix" x="126" y="350">~$</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.01s" fill="freeze" begin="7.8s"/>
  </g>

  <!-- Typing cursor for line 7 -->
  <rect x="152" y="335" width="10" height="18" fill="#00ff41" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.01s" fill="freeze" begin="8.0s"/>
    <animate attributeName="opacity" from="1" to="0" dur="0.01s" fill="freeze" begin="9.1s"/>
    <animate attributeName="x" from="152" to="282" dur="0.6s" begin="8.5s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1" dur="0.4s" repeatCount="indefinite" begin="8.0s"/>
  </rect>

  <g clip-path="url(#type4)">
    <text class="t cmd" x="152" y="350">echo $STATUS</text>
  </g>


  <!-- ============================================================ -->
  <!-- LINE 8: status output                                        -->
  <!-- ============================================================ -->
  <g opacity="0">
    <text class="t green" x="30" y="380">Building the future, one commit at a time...</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.15s" fill="freeze" begin="9.5s"/>
  </g>


  <!-- ============================================================ -->
  <!-- FINAL: idle prompt with blinking cursor                      -->
  <!-- ============================================================ -->
  <g opacity="0">
    <text class="t prompt" x="30" y="405">nick@dev</text>
    <text class="t sep" x="118" y="405">:</text>
    <text class="t cmd-prefix" x="126" y="405">~$</text>
    <rect class="cursor" x="152" y="390" width="10" height="18" fill="#00ff41" filter="url(#glow)"/>
    <animate attributeName="opacity" from="0" to="1" dur="0.01s" fill="freeze" begin="10.0s"/>
  </g>

  <!-- Subtle grid lines -->
  <g clip-path="url(#terminalClip)" opacity="0.02">
    <line x1="10" y1="80" x2="890" y2="80" stroke="#00ff41"/>
    <line x1="10" y1="140" x2="890" y2="140" stroke="#00ff41"/>
    <line x1="10" y1="200" x2="890" y2="200" stroke="#00ff41"/>
    <line x1="10" y1="260" x2="890" y2="260" stroke="#00ff41"/>
    <line x1="10" y1="320" x2="890" y2="320" stroke="#00ff41"/>
    <line x1="10" y1="380" x2="890" y2="380" stroke="#00ff41"/>
  </g>
</svg>
